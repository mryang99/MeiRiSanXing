name: Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Debug - List files
        run: find . -maxdepth 4 -not -path "./.git/*" | sort

      - name: Create project.yml (inline to avoid web UI issues)
        run: |
          cat > project.yml << 'YAMLEOF'
name: MeiRiSanXing
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "18.0"
targets:
  MeiRiSanXing:
    type: application
    platform: iOS
    sources:
      - Sources/MeiRiSanXing
    info:
      path: Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.meirisanxing
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_STYLE: Automatic
YAMLEOF

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Debug - Show project.yml
        run: cat project.yml

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild build \
            -project MeiRiSanXing.xcodeproj \
            -scheme MeiRiSanXing \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.0" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        timeout-minutes: 15

      - name: Run Tests
        run: |
          xcodebuild test \
            -project MeiRiSanXing.xcodeproj \
            -scheme MeiRiSanXing \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=18.0" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        timeout-minutes: 10

      - name: Archive .app
        run: |
          cd ~/Library/Developer/Xcode/DerivedData
          find . -name "*.app" -path "*/Build/Products/*" | head -1 | xargs -I{} cp -R {} $RUNNER_TEMP/MeiRiSanXing.app
          cd $RUNNER_TEMP
          zip -r MeiRiSanXing.zip MeiRiSanXing.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeiRiSanXing-app
          path: ${{ runner.temp }}/MeiRiSanXing.zip
