name: Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Create project.yml
        run: |
          echo "name: MeiRiSanXing" > project.yml
          echo "options:" >> project.yml
          echo "  bundleIdPrefix: com.example" >> project.yml
          echo "  deploymentTarget:" >> project.yml
          echo '    iOS: "18.0"' >> project.yml
          echo "targets:" >> project.yml
          echo "  MeiRiSanXing:" >> project.yml
          echo "    type: application" >> project.yml
          echo "    platform: iOS" >> project.yml
          echo "    sources:" >> project.yml
          echo "      - Sources/MeiRiSanXing" >> project.yml
          echo "    info:" >> project.yml
          echo "      path: Info.plist" >> project.yml
          echo "    settings:" >> project.yml
          echo "      base:" >> project.yml
          echo "        PRODUCT_BUNDLE_IDENTIFIER: com.example.meirisanxing" >> project.yml
          echo "        INFOPLIST_FILE: Info.plist" >> project.yml
          echo "        CODE_SIGN_STYLE: Automatic" >> project.yml

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build for device (unsigned)
        run: |
          xcodebuild build \
            -project MeiRiSanXing.xcodeproj \
            -scheme MeiRiSanXing \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee build.log
        timeout-minutes: 15

      - name: Show compile errors
        run: |
          grep -A5 "error:" build.log || echo "✅ Build succeeded!"
          echo "---LAST 20 LINES---"
          tail -20 build.log

      - name: Archive .app
        run: |
          cd ~/Library/Developer/Xcode/DerivedData
          find . -name "*.app" -path "*/Build/Products/Debug*" | head -1 | xargs -I{} cp -R {} $RUNNER_TEMP/MeiRiSanXing.app
          cd $RUNNER_TEMP
          zip -r MeiRiSanXing.zip MeiRiSanXing.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeiRiSanXing-app
          path: ${{ runner.temp }}/MeiRiSanXing.zip
